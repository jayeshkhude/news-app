<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewsLens — Community Chat</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Courier New', monospace; background: #fff; color: #111; display: flex; flex-direction: column; height: 100vh; }

        #progressBar {
            position: fixed; top: 0; left: 0;
            height: 2px; background: #111; width: 0%;
            z-index: 9999; transition: width 0.1s linear;
        }

        .nav {
            position: sticky; top: 0;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(8px);
            display: flex; justify-content: space-between; align-items: center;
            padding: 28px 48px;
            border-bottom: 0.5px solid #ccc;
            flex-shrink: 0;
            z-index: 100;
            transition: padding 0.3s ease;
        }
        .nav.scrolled { padding: 16px 48px; }
        .nav-logo { font-size: 15px; letter-spacing: 0.08em; font-weight: 700; }
        .nav-logo a {
            text-decoration: none; color: #111;
            display: flex; align-items: center; gap: 12px;
        }
        .logo-mark {
            width: 32px; height: 32px; background: #111;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; color: #fff; font-weight: 700; letter-spacing: -1px;
            transition: transform 0.2s ease;
        }
        .nav-logo a:hover .logo-mark { transform: rotate(6deg); }
        .nav-right {
            font-size: 12px; color: #666; letter-spacing: 0.04em;
            text-decoration: none; position: relative;
            transition: color 0.2s;
        }
        .nav-right::after {
            content: ''; position: absolute; bottom: -2px; left: 0;
            width: 0; height: 0.5px; background: #111; transition: width 0.2s;
        }
        .nav-right:hover { color: #111; }
        .nav-right:hover::after { width: 100%; }

        .chat-info {
            padding: 28px 48px;
            border-bottom: 0.5px solid #ccc;
            flex-shrink: 0;
            opacity: 0; animation: fadeUp 0.5s ease forwards 0.1s;
        }
        @keyframes fadeUp { to { opacity: 1; transform: translateY(0); } }
        .chat-info h2 { font-size: 13px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; margin-bottom: 8px; }
        .chat-info p { font-size: 12px; color: #555; line-height: 1.7; }
        .chat-rules { display: flex; gap: 24px; margin-top: 12px; flex-wrap: wrap; }
        .rule {
            font-size: 11px; color: #888; letter-spacing: 0.04em;
            border-left: 1px solid #ccc; padding-left: 12px;
            transition: border-color 0.2s, color 0.2s;
        }
        .rule:hover { border-color: #111; color: #444; }

        .chat-container {
            flex: 1; overflow-y: auto;
            padding: 32px 48px;
            display: flex; flex-direction: column; gap: 16px;
        }

        .message {
            display: flex; flex-direction: column; gap: 4px;
            max-width: 65%;
            opacity: 0; transform: translateY(8px);
            animation: fadeUp 0.3s ease forwards;
        }
        .message .name { font-size: 11px; color: #888; letter-spacing: 0.06em; text-transform: uppercase; }
        .message .text {
            font-size: 13px; color: #111; line-height: 1.65;
            background: #f7f7f7; padding: 12px 16px;
            border: 0.5px solid #e8e8e8;
            transition: border-color 0.15s, background 0.15s;
        }
        .message:hover .text { border-color: #ccc; background: #f3f3f3; }
        .message .time { font-size: 11px; color: #bbb; }

        .input-area {
            border-top: 0.5px solid #ccc;
            padding: 20px 48px;
            flex-shrink: 0;
            opacity: 0; animation: fadeUp 0.5s ease forwards 0.2s;
        }
        .input-row {
            display: flex; gap: 0; border: 0.5px solid #888; max-width: 700px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-row:focus-within { border-color: #111; box-shadow: 3px 3px 0 #111; }
        .input-row input {
            flex: 1; padding: 14px 20px; border: none; outline: none;
            font-family: 'Courier New', monospace; font-size: 13px; color: #111; background: #fff;
        }
        .char-display {
            padding: 14px 16px; font-size: 11px; color: #999;
            align-self: center; white-space: nowrap;
            border-left: 0.5px solid #e8e8e8;
            transition: color 0.2s;
        }
        .char-display.near-limit { color: #c00; }
        .send-btn {
            padding: 14px 28px; background: #111; color: #fff;
            border: none; cursor: pointer;
            font-family: 'Courier New', monospace; font-size: 13px; letter-spacing: 0.06em;
            transition: background 0.2s, transform 0.15s;
        }
        .send-btn:hover { background: #333; }
        .send-btn:active { transform: scale(0.98); }

        .error-msg {
            font-size: 12px; color: #c00; padding: 8px 0;
            max-width: 700px; letter-spacing: 0.02em; display: none;
            animation: fadeUp 0.3s ease;
        }

        .empty-msg { font-size: 13px; color: #999; padding: 16px 0; }

        .loading-dots { display: flex; gap: 4px; align-items: center; padding: 16px 0; }
        .loading-dots span {
            display: inline-block; width: 6px; height: 6px;
            background: #ccc; border-radius: 50%;
            animation: dotPulse 1.2s ease-in-out infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse {
            0%,80%,100% { transform: scale(0.6); background: #ccc; }
            40% { transform: scale(1); background: #111; }
        }
    </style>
</head>
<body>

<div id="progressBar"></div>

<nav class="nav" id="mainNav">
    <span class="nav-logo">
        <a href="index.html">
            <div class="logo-mark">NL</div>
            NEWSLENS
        </a>
    </span>
    <a href="index.html" class="nav-right">← Back to News</a>
</nav>

<div class="chat-info">
    <h2>Community Chat</h2>
    <p>One open room. Talk about anything — news, opinions, or whatever's on your mind. Anonymous and permanent.</p>
    <div class="chat-rules">
        <span class="rule">Anonymous</span>
        <span class="rule">Max 200 characters</span>
        <span class="rule">2 messages per 5 minutes</span>
        <span class="rule">Messages stored permanently</span>
    </div>
</div>

<div class="chat-container" id="chatContainer">
    <div class="loading-dots"><span></span><span></span><span></span></div>
</div>

<div class="input-area">
    <div class="input-row">
        <input type="text" id="msgInput" placeholder="Say something..." maxlength="200" />
        <span class="char-display" id="charCount">0 / 200</span>
        <button class="send-btn" onclick="sendMessage()">Send</button>
    </div>
    <div class="error-msg" id="errorMsg"></div>
</div>

<script>
    const API = 'https://news-app-dmoy.onrender.com';

    window.addEventListener('scroll', () => {
        const nav = document.getElementById('mainNav');
        window.scrollY > 30 ? nav.classList.add('scrolled') : nav.classList.remove('scrolled');
    });

    async function loadMessages() {
        try {
            const res = await fetch(`${API}/api/chat/messages`);
            const data = await res.json();
            const container = document.getElementById('chatContainer');

            if (data.length === 0) {
                container.innerHTML = '<div class="empty-msg">No messages yet. Start the conversation.</div>';
                return;
            }

            const wasAtBottom = container.scrollHeight - container.scrollTop <= container.clientHeight + 40;

            container.innerHTML = data.map((m, i) => `
                <div class="message" style="animation-delay:${i * 40}ms">
                    <span class="name">Anonymous</span>
                    <div class="text">${m.message}</div>
                    <span class="time">${new Date(m.sent_at).toLocaleTimeString('en-IN', {hour:'2-digit', minute:'2-digit'})}</span>
                </div>
            `).join('');

            if (wasAtBottom) container.scrollTop = container.scrollHeight;
        } catch(e) {
            document.getElementById('chatContainer').innerHTML = '<div class="empty-msg">Could not load messages. Make sure the server is running.</div>';
        }
    }

    async function sendMessage() {
        const input = document.getElementById('msgInput');
        const message = input.value.trim();
        if (!message) return;

        const btn = document.querySelector('.send-btn');
        btn.textContent = '...';
        btn.disabled = true;

        const res = await fetch(`${API}/api/chat/send`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message })
        });

        const data = await res.json();
        const err = document.getElementById('errorMsg');

        btn.textContent = 'Send';
        btn.disabled = false;

        if (data.error) {
            err.textContent = data.error;
            err.style.display = 'block';
            setTimeout(() => err.style.display = 'none', 5000);
            return;
        }

        input.value = '';
        document.getElementById('charCount').textContent = '0 / 200';
        document.getElementById('charCount').classList.remove('near-limit');
        err.style.display = 'none';
        loadMessages();
    }

    document.getElementById('msgInput').addEventListener('input', function() {
        const len = this.value.length;
        const counter = document.getElementById('charCount');
        counter.textContent = `${len} / 200`;
        len > 170 ? counter.classList.add('near-limit') : counter.classList.remove('near-limit');
    });

    document.getElementById('msgInput').addEventListener('keypress', e => {
        if (e.key === 'Enter') sendMessage();
    });

    loadMessages();
    setInterval(loadMessages, 5000);
</script>

</body>
</html>
